<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="HuddleUp — Huddle up your team's AI coding sessions">
  <title>HuddleUp — Huddle up your team's AI coding sessions</title>
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo, centered top -->
  <g transform="translate(530, 110)">
    <g fill="#6366F1" opacity="0.55">
      <circle cx="105" cy="70" r="9"/>
      <circle cx="88" cy="40" r="9"/>
      <circle cx="52" cy="40" r="9"/>
      <circle cx="35" cy="70" r="9"/>
      <circle cx="52" cy="100" r="9"/>
      <circle cx="88" cy="100" r="9"/>
    </g>
    <circle cx="70" cy="70" r="14" fill="#6366F1"/>
    <path d="M 105 70 L 88 40 L 52 40 L 35 70 L 52 100 L 88 100 Z"
          stroke="#6366F1" stroke-width="1.4" fill="none" opacity="0.25"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="350"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif"
        font-size="112"
        font-weight="800"
        letter-spacing="-3"
        fill="#0F172A">Huddle<tspan fill="#6366F1">Up</tspan></text>

  <!-- Tagline -->
  <text x="600" y="430"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif"
        font-size="34"
        font-weight="500"
        letter-spacing="-0.5"
        fill="#475569">Huddle up your team&#8217;s AI coding sessions.</text>

  <!-- Tool badges -->
  <g transform="translate(0, 510)"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif"
     font-size="20"
     font-weight="600"
     fill="#64748B"
     text-anchor="middle">
    <text x="600" y="0" letter-spacing="2">CLAUDE CODE  &#183;  CURSOR  &#183;  CODEX  &#183;  COPILOT  &#183;  WINDSURF</text>
  </g>
</svg>
