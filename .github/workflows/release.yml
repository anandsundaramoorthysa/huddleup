name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release from (e.g. v0.1.2)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Promote the marketplace secrets to job-level env so the step-level
    # `if: env.X != ''` conditionals can actually read them (GitHub
    # Actions evaluates `if:` BEFORE setting step-level `env:`).
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm (skip if version already exists)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VER" version >/dev/null 2>&1; then
            echo "npm: $PKG_NAME@$PKG_VER already published — skipping."
          else
            npm publish --access public
          fi

      - name: Build VS Code extension
        working-directory: vscode-huddleup
        run: |
          npm ci
          npm run build

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        working-directory: vscode-huddleup
        run: npx @vscode/vsce publish -p "$VSCE_PAT"

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        working-directory: vscode-huddleup
        run: npx ovsx publish -p "$OVSX_PAT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            vscode-huddleup/*.vsix
