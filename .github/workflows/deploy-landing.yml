name: Deploy landing site

on:
  push:
    branches: [master]
    paths:
      - 'landing/**'
      - 'assets/brand/**'
      - 'vscode-huddleup/media/screenshot-*.png'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Sanity-check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID must both be set as repository secrets."
            exit 1
          fi

      - run: npm ci

      - run: npm run build

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Wrangler exits non-zero if the project already exists; that's fine, swallow it.
          npx wrangler pages project create huddleup-site --production-branch=master 2>&1 \
            | tee /tmp/create.log \
            || grep -q -E "(already exists|already been created|400 Bad Request)" /tmp/create.log

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name=huddleup-site \
            --branch=${{ github.ref_name }} \
            --commit-dirty=true
